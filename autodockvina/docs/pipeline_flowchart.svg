<svg xmlns="http://www.w3.org/2000/svg" width="1620" height="1260" viewBox="0 0 1620 1260">
  <rect width="1620" height="1260" fill="#ffffff"/>
  <style>
    .box { fill: #f8fafc; stroke: #1f2937; stroke-width: 2; rx: 10; ry: 10; }
    .decision { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2; }
    .text { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #111827; }
    .small { font-family: Arial, Helvetica, sans-serif; font-size: 16px; fill: #111827; }
    .arrow { stroke: #374151; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .label { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #1f2937; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>

  <rect class="box" x="40" y="40" width="300" height="82"/>
  <text class="text" x="68" y="73">Top-level p0 or p1 folders,</text>
  <text class="text" x="68" y="98">single run folder, or</text>
  <text class="text" x="68" y="123">Boltz results root</text>

  <rect class="box" x="380" y="40" width="260" height="82"/>
  <text class="text" x="426" y="78">Optional Boltz YAML</text>
  <text class="small" x="426" y="104">ligand and cofactor metadata</text>

  <rect class="box" x="1260" y="40" width="220" height="82"/>
  <text class="text" x="1302" y="78">platinumresults.md</text>
  <text class="small" x="1302" y="104">experimental reference</text>

  <polygon class="decision" points="740,40 940,80 740,120 540,80"/>
  <text class="text" x="626" y="86">Choose entrypoint</text>

  <rect class="box" x="60" y="180" width="250" height="78"/>
  <text class="text" x="106" y="214">Batch docking</text>
  <text class="small" x="106" y="239">run_all_p_runs.py or</text>
  <text class="small" x="106" y="259">scripts/run_cif_batch.py</text>

  <rect class="box" x="350" y="180" width="250" height="78"/>
  <text class="text" x="397" y="214">Single-run direct</text>
  <text class="small" x="397" y="239">scripts/score_boltz_run.py</text>

  <rect class="box" x="640" y="180" width="280" height="78"/>
  <text class="text" x="674" y="214">Single-run minimized</text>
  <text class="small" x="674" y="239">scripts/score_boltz_run_minimized.py</text>

  <rect class="box" x="970" y="180" width="300" height="78"/>
  <text class="text" x="1025" y="214">End-to-end wrapper</text>
  <text class="small" x="1025" y="239">scripts/run_pipeline_from_cif.py</text>

  <rect class="box" x="655" y="320" width="250" height="72"/>
  <text class="text" x="694" y="362">Preflight ligand routing</text>

  <rect class="box" x="1010" y="320" width="300" height="82"/>
  <text class="text" x="1048" y="356">batch_manifest.tsv</text>
  <text class="small" x="1048" y="382">and batch_summary.json</text>

  <rect class="box" x="655" y="450" width="250" height="82"/>
  <text class="text" x="683" y="486">Option A receptor prep</text>
  <text class="small" x="683" y="512">and restrained minimization</text>

  <rect class="box" x="350" y="450" width="250" height="82"/>
  <text class="text" x="390" y="486">meeko_cif_to_vina.py</text>
  <text class="small" x="390" y="512">per-CIF executor</text>

  <rect class="box" x="350" y="590" width="250" height="82"/>
  <text class="text" x="387" y="626">Rebuild ligand chemistry</text>
  <text class="small" x="387" y="652">and apply RMSD guards</text>

  <rect class="box" x="350" y="730" width="250" height="82"/>
  <text class="text" x="403" y="766">Vina score-only</text>
  <text class="small" x="403" y="792">and docking or redocking</text>

  <rect class="box" x="350" y="870" width="280" height="92"/>
  <text class="text" x="391" y="906">Write per-CIF artifacts</text>
  <text class="small" x="391" y="932">receptor, ligand, PDBQT, logs,</text>
  <text class="small" x="391" y="954">and affinity text files</text>

  <rect class="box" x="40" y="870" width="250" height="92"/>
  <text class="text" x="78" y="906">Single-run summaries</text>
  <text class="small" x="78" y="932">per_cif_affinities.tsv</text>
  <text class="small" x="78" y="954">run_affinity_summary.tsv</text>

  <rect class="box" x="690" y="870" width="250" height="92"/>
  <text class="text" x="720" y="906">Batch summary output</text>
  <text class="small" x="720" y="932">vina_batch_summary.tsv</text>
  <text class="small" x="720" y="954">one row per CIF</text>

  <rect class="box" x="690" y="1000" width="250" height="72"/>
  <text class="text" x="718" y="1042">build_docking_features.py</text>

  <rect class="box" x="690" y="1130" width="250" height="72"/>
  <text class="text" x="734" y="1172">docking_agg_features.tsv</text>

  <rect class="box" x="1040" y="590" width="250" height="72"/>
  <text class="text" x="1076" y="632">parse_platinum.py</text>

  <rect class="box" x="1040" y="730" width="250" height="72"/>
  <text class="text" x="1070" y="772">build_dataset.py</text>

  <rect class="box" x="1040" y="870" width="250" height="72"/>
  <text class="text" x="1072" y="912">training_dataset.tsv</text>

  <rect class="box" x="1040" y="1000" width="250" height="72"/>
  <text class="text" x="1078" y="1042">train_models.py</text>

  <rect class="box" x="1040" y="1130" width="250" height="72"/>
  <text class="text" x="1057" y="1172">models/manifest.json</text>

  <rect class="box" x="1360" y="1000" width="220" height="72"/>
  <text class="text" x="1406" y="1042">predict_dg.py</text>

  <rect class="box" x="1360" y="1130" width="220" height="72"/>
  <text class="text" x="1390" y="1172">dg_predictions.tsv</text>

